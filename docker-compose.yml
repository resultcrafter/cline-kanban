version: "3.8"

# Cline Kanban — reference configuration
# Copy .env.example to .env and fill in values, then: docker compose up -d
# Works with: docker compose, podman-compose
# For raw docker/podman run, use this file as a reference for required mounts and env vars.

services:
  kanban:
    image: ghcr.io/resultcrafter/cline-kanban-zai:main
    container_name: cline-kanban
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - kanban-data:/home/kanban/.cline
      - /shared-workspaces:/projects:rw

volumes:
  kanban-data:
